name: Publish

# Publishes @jxburros/context-nugget to both npmjs.org and GitHub Packages.
# npmjs.org is the primary install path for consumers; GitHub Packages is kept
# for GitHub-native workflows and portfolio repos that already consume it.
on:
  release:
    types: [published]

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - name: Verify release tag matches package version
        run: |
          node -e "const { readFileSync } = require('node:fs'); const pkg = JSON.parse(readFileSync('package.json', 'utf8')); const expected = 'v' + pkg.version; const actual = process.env.GITHUB_REF_NAME; if (actual !== expected) { console.error(`Release tag ${actual} does not match package version ${expected}`); process.exit(1); }"
      - run: npm run typecheck
      - run: npm run build
      - run: npm test
      - run: npm run build:nugget
      - name: Fail if committed dist/ or nugget/ is stale
        run: |
          if [ -n "$(git status --porcelain dist nugget)" ]; then
            echo "::error::dist/ or nugget/ is out of date. Run 'npm run build && npm run build:nugget' and commit the result."
            git --no-pager diff --stat dist nugget
            exit 1
          fi

  publish-npm:
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-github:
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@jxburros'
      - run: npm ci
      - run: npm publish --registry=https://npm.pkg.github.com
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
